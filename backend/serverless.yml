service: queryguard-backend

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs20.x
  region: ${opt:region, 'us-east-1'}
  stage: ${opt:stage, 'dev'}
  memorySize: 512
  timeout: 30
  environment:
    ML_SERVICE_URL: ${env:ML_SERVICE_URL, 'http://ml-service:8000'}
    ANTHROPIC_API_KEY: ${env:ANTHROPIC_API_KEY}
    CORS_ORIGIN: ${env:CORS_ORIGIN, '*'}
    NODE_ENV: production

functions:
  api:
    handler: dist/lambda.handler
    events:
      - httpApi:
          path: /{proxy+}
          method: ANY
      - httpApi:
          path: /
          method: ANY

plugins:
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 3001
