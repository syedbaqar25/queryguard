name: Publish NPM Package

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish queryguard-middleware to NPM
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: queryguard-middleware
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: queryguard-middleware/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
